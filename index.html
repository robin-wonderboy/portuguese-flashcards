<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🇵🇹 Portuguese Flashcards</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="PT Vocab">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-stats">
            <div class="header-stat">⭐ <span class="value" id="totalMastered">0</span></div>
            <div class="header-stat">📚 <span class="value" id="totalWords">0</span></div>
            <div class="header-stat">🔥 <span class="value" id="dayStreak">0</span></div>
        </div>
        <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('practice')">📚 Practice</button>
        <button class="tab" onclick="showTab('words')">📖 All Words</button>
    </div>
    
    <!-- Practice Tab -->
    <div id="practiceTab">
        <div id="cardScreen">
            <div class="progress-section">
                <div class="progress-text">
                    <span id="progressLabel">0 / 0</span>
                    <span id="streakLabel">🔥 0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="card-container">
                <div class="card" id="flashcard" onclick="flipCard()">
                    <div class="card-face card-front">
                        <span class="card-mastery mastery-new" id="frontMastery">New</span>
                        <div class="card-lang" id="frontLang">Português</div>
                        <div class="card-word" id="frontWord">Loading...</div>
                        <button class="speak-btn" id="frontSpeak" onclick="event.stopPropagation(); speakCurrent('front')">🔊</button>
                        <div class="card-hint">👆 Tap to reveal</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-lang" id="backLang">Deutsch</div>
                        <div class="card-word" id="backWord">...</div>
                        <button class="speak-btn" id="backSpeak" onclick="event.stopPropagation(); speakCurrent('back')">🔊</button>
                        <div class="card-example" id="exampleText"></div>
                        <div class="card-example-translation" id="exampleTranslation"></div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn-dont-know" onclick="markCard(false)">Wrong</button>
                <button class="btn-know" onclick="markCard(true)">Correct</button>
            </div>
        </div>
        
        <div id="completeScreen" class="complete-screen hidden">
            <h2>🎉 Complete!</h2>
            <div class="complete-score" id="finalScore">0%</div>
            <div class="complete-message" id="finalMessage">Great job!</div>
            
            <div class="controls" style="justify-content: center;">
                <button class="btn-know" onclick="restartQuiz()">Again</button>
                <button class="btn-secondary" onclick="reviewMissed()">Review</button>
            </div>
            
            <div class="review-list hidden" id="reviewList">
                <h3>❌ Missed:</h3>
                <div id="reviewItems"></div>
            </div>
        </div>
    </div>
    
    <!-- Words Tab -->
    <div id="wordsTab" class="hidden">
        <div class="word-list" id="wordList"></div>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>⚙️ Settings</h2>
                <button class="modal-close" onclick="toggleSettings()">×</button>
            </div>
            
            <div class="setting-group">
                <div class="setting-label">Card Languages</div>
                <div class="setting-row">
                    <select id="frontLangSelect" onchange="updateLangSelectors()">
                        <option value="pt">🇵🇹 PT</option>
                        <option value="de">🇩🇪 DE</option>
                        <option value="en">🇬🇧 EN</option>
                    </select>
                    <span class="arrow">→</span>
                    <select id="backLangSelect" onchange="updateLangSelectors()">
                        <option value="pt">🇵🇹 PT</option>
                        <option value="de" selected>🇩🇪 DE</option>
                        <option value="en">🇬🇧 EN</option>
                    </select>
                </div>
            </div>
            
            <div class="setting-group">
                <div class="setting-label">Word Set</div>
                <select id="dateSelect" onchange="loadDate()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #3d3d5c; background: #2d2d44; color: white;">
                    <option value="today">📰 Hoje (Today)</option>
                    <option value="daily">📅 Daily Mix</option>
                    <option value="random10">🎲 Random 10</option>
                    <option value="weak">🎯 Weak Words</option>
                    <option value="all">📚 All Words</option>
                    <option value="manual">📝 Manual Vocab</option>
                </select>
            </div>
            
            <div class="setting-group">
                <div class="setting-label">Voices</div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="min-width: 30px;">🇵🇹</span>
                        <select id="voicePT" onchange="saveVoicePref('pt', this.value)" style="flex:1; padding: 8px; border-radius: 8px; border: 1px solid #3d3d5c; background: #2d2d44; color: white; font-size: 0.85rem;"></select>
                        <button onclick="testVoice('pt')" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">🔊</button>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="min-width: 30px;">🇩🇪</span>
                        <select id="voiceDE" onchange="saveVoicePref('de', this.value)" style="flex:1; padding: 8px; border-radius: 8px; border: 1px solid #3d3d5c; background: #2d2d44; color: white; font-size: 0.85rem;"></select>
                        <button onclick="testVoice('de')" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">🔊</button>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="min-width: 30px;">🇬🇧</span>
                        <select id="voiceEN" onchange="saveVoicePref('en', this.value)" style="flex:1; padding: 8px; border-radius: 8px; border: 1px solid #3d3d5c; background: #2d2d44; color: white; font-size: 0.85rem;"></select>
                        <button onclick="testVoice('en')" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">🔊</button>
                    </div>
                </div>
            </div>

            <div class="setting-group">
                <div class="setting-label">Options</div>
                <label class="setting-checkbox">
                    <input type="checkbox" id="shuffleMode" checked>
                    🔀 Shuffle cards
                </label>
            </div>
            
            <div class="setting-group" style="text-align: center; opacity: 0.6; font-size: 0.8rem;">
                <span id="lastUpdateInfo">📡 Loading...</span>
            </div>

            <div class="modal-actions">
                <button class="btn-secondary" onclick="restartQuiz(); toggleSettings();">Restart Game</button>
                <button class="btn-secondary" onclick="exportProgress()">Export Progress</button>
                <button class="btn-secondary" onclick="document.getElementById('importFile').click()">Import Progress</button>
                <input type="file" id="importFile" style="display:none" accept=".json" onchange="importProgress(event)">
                <button class="btn-danger" onclick="resetProgress()">Reset All</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
